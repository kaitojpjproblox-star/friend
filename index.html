<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>米うさぎ赤軍</title>

<style>

body{
    margin:0;
    background:#b30000;
    color:#ffd700;
    font-family:sans-serif;
}

header{
    background:#8b0000;
    text-align:center;
    padding:20px;
}

header h1{
    margin:0;
}

nav{
    background:#660000;
    padding:10px;
    display:flex;
    justify-content:center;
    gap:15px;
}

nav button{
    background:none;
    border:none;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.page{
    display:none;
    padding:20px;
}

.active{
    display:block;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
}

.card{
    background:white;
    color:black;
    border-radius:10px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

input,
textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    box-sizing:border-box;
}

button{
    padding:10px;
}

.admin-only{
    display:none;
}

#articleView,
#enemyView{
    display:none;
    background:white;
    color:black;
    padding:20px;
    border-radius:10px;
    margin-top:20px;
}

</style>
</head>

<body>

<header>
<h1>米うさぎ赤軍</h1>
</header>

<nav>

<button onclick="showPage('home')">
ホーム
</button>

<button onclick="showPage('diary')">
主席日記
</button>

<button onclick="showPage('enemy')">
敵対組織
</button>

<button onclick="showPage('login')">
ログイン
</button>

</nav>

<section id="home" class="page active">

<h2>最新記事</h2>

<div id="articleList" class="grid"></div>

</section>

<section id="diary" class="page">

<h2>主席日記投稿</h2>

<div id="editor" class="admin-only">

<label>タイトル</label>
<input id="title">

<label>投稿者</label>
<input id="author">

<label>画像URL</label>
<input id="image">

<label>本文</label>

<textarea id="content" rows="10"></textarea>

<button onclick="saveArticle()">
投稿
</button>

</div>

<div id="articleView"></div>

</section>

<section id="enemy" class="page">

<h2>敵対組織一覧</h2>

<div id="enemyEditor" class="admin-only">

<label>組織名</label>
<input id="enemyName">

<label>画像URL</label>
<input id="enemyImage">

<label>説明</label>

<textarea id="enemyDescription"></textarea>

<button onclick="saveEnemy()">
登録
</button>

</div>

<div id="enemyList" class="grid"></div>

<div id="enemyView"></div>

</section>

<section id="login" class="page">

<h2>ログイン</h2>

<input id="user" placeholder="ユーザー名">

<input
id="pass"
type="password"
placeholder="パスワード">

<button onclick="login()">
ログイン
</button>

<p id="loginResult"></p>

</section><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
  getDatabase,
  ref,
  push,
  onValue,
  remove,
  update
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBnck9we-VfPoBN4lNhym01lQv9874OtE0",
  authDomain: "friend-suzu.firebaseapp.com",
  databaseURL: "https://friend-suzu-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "friend-suzu",
  storageBucket: "friend-suzu.firebasestorage.app",
  messagingSenderId: "623197944143",
  appId: "1:623197944143:web:5648b421a278561bf32d3a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.showPage = function(page){

  document
    .querySelectorAll(".page")
    .forEach(pageElement=>{
      pageElement.classList.remove("active");
    });

  document
    .getElementById(page)
    .classList.add("active");
};

window.login = function(){

  const user =
    document.getElementById("user").value;

  const pass =
    document.getElementById("pass").value;

  if(
    user === "yeahbrouiui" &&
    pass === "0306"
  ){

    localStorage.setItem(
      "loggedIn",
      "true"
    );

    document
      .querySelectorAll(".admin-only")
      .forEach(item=>{
        item.style.display = "block";
      });

    document
      .getElementById("loginResult")
      .textContent = "ログイン成功";

  }else{

    document
      .getElementById("loginResult")
      .textContent = "ログイン失敗";
  }
};

window.saveArticle = function(){

  const article = {

    title:
      document.getElementById("title").value,

    author:
      document.getElementById("author").value,

    image:
      document.getElementById("image").value,

    content:
      document.getElementById("content").value,

    createdAt:
      new Date().toLocaleString()
  };

  if(window.currentEditId){

    update(
      ref(
        db,
        "articles/" +
        window.currentEditId
      ),
      article
    );

    window.currentEditId = null;

  }else{

    push(
      ref(db,"articles"),
      article
    );
  }

  document.getElementById("title").value="";
  document.getElementById("author").value="";
  document.getElementById("image").value="";
  document.getElementById("content").value="";
};

window.saveEnemy = function(){

  push(
    ref(db,"enemies"),
    {

      name:
        document.getElementById("enemyName").value,

      image:
        document.getElementById("enemyImage").value,

      description:
        document.getElementById("enemyDescription").value,

      createdAt:
        new Date().toLocaleString()
    }
  );

  document.getElementById("enemyName").value="";
  document.getElementById("enemyImage").value="";
  document.getElementById("enemyDescription").value="";
};

window.onload = function(){

  if(
    localStorage.getItem("loggedIn")
    === "true"
  ){

    document
      .querySelectorAll(".admin-only")
      .forEach(item=>{
        item.style.display="block";
      });
  }
};
    onValue(
  ref(db,"articles"),
  (snapshot)=>{

    const data = snapshot.val() || {};

    let html = "";

    Object.entries(data)
      .reverse()
      .forEach(([id,item])=>{

      html += `
      <div class="card">

        <img
        src="${item.image}"
        onerror="this.style.display='none'">

        <div class="card-content">

          <h3>${item.title}</h3>

          <p>投稿者: ${item.author}</p>

          <p>${item.createdAt}</p>

          <p>
          ${item.content.substring(0,100)}
          ...
          </p>

          <button onclick="readArticle('${id}')">
          続きを読む
          </button>

          <button onclick="editArticle('${id}')">
          編集
          </button>

          <button onclick="deleteArticle('${id}')">
          削除
          </button>

        </div>

      </div>
      `;
    });

    document.getElementById("articleList").innerHTML = html;
  }
);

window.readArticle = function(id){

  onValue(
    ref(db,"articles/"+id),
    (snapshot)=>{

      const item = snapshot.val();

      const view =
        document.getElementById("articleView");

      view.style.display = "block";

      view.innerHTML = `

      <h2>${item.title}</h2>

      <p>投稿者: ${item.author}</p>

      <p>${item.createdAt}</p>

      <img
      src="${item.image}"
      style="
      width:100%;
      max-width:700px;
      ">

      <hr>

      <p>${item.content}</p>

      `;
    },
    { onlyOnce:true }
  );
};

window.editArticle = function(id){

  onValue(
    ref(db,"articles/"+id),
    (snapshot)=>{

      const item = snapshot.val();

      document.getElementById("title").value =
        item.title;

      document.getElementById("author").value =
        item.author;

      document.getElementById("image").value =
        item.image;

      document.getElementById("content").value =
        item.content;

      window.currentEditId = id;

      showPage("diary");
    },
    { onlyOnce:true }
  );
};

window.deleteArticle = function(id){

  if(
    confirm("この記事を削除しますか？")
  ){

    remove(
      ref(db,"articles/"+id)
    );
  }
};

onValue(
  ref(db,"enemies"),
  (snapshot)=>{

    const data = snapshot.val() || {};

    let html = "";

    Object.entries(data)
      .reverse()
      .forEach(([id,item])=>{

      html += `
      <div class="card">

        <img
        src="${item.image}"
        onerror="this.style.display='none'">

        <div class="card-content">

          <h3>${item.name}</h3>

          <p>${item.description}</p>

        </div>

      </div>
      `;
    });

    document.getElementById("enemyList").innerHTML =
      html;
  }
);

</script>

</body>
</html>
