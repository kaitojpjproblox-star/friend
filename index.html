<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>米うさぎ赤軍</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#f5f5f5;
}

header{
    background:#b30000;
    color:white;
    padding:15px;
    text-align:center;
}

nav{
    background:#8b0000;
    padding:10px;
    display:flex;
    gap:15px;
    justify-content:center;
}

nav a{
    color:white;
    text-decoration:none;
}

section{
    padding:20px;
}

.page{
    display:none;
}

.active{
    display:block;
}

textarea{
    width:100%;
    height:200px;
}

button{
    padding:10px 15px;
    cursor:pointer;
}

#warning{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    display:flex;
    justify-content:center;
    align-items:center;
}

#warningBox{
    background:white;
    padding:30px;
    border-radius:10px;
    text-align:center;
    max-width:500px;
}

#diaryEditor{
    display:none;
}
</style>
</head>

<body>

<div id="warning">
    <div id="warningBox">
        <h2>注意</h2>
        <p>
            このサイトはフィクションです。<br>
            実在する人物・団体とは関係ありません。
        </p>
        <button onclick="acceptWarning()">同意する</button>
    </div>
</div>

<header>
    <h1>米うさぎ赤軍</h1>
</header>

<nav>
    <a href="#" onclick="showPage('home')">ホーム</a>
    <a href="#" onclick="showPage('diary')">主席日記</a>
    <a href="#" onclick="showPage('enemy')">敵対組織について</a>
    <a href="#" onclick="showPage('login')">ログイン</a>
</nav>

<section id="home" class="page active">
    <h2>ホーム</h2>
    <p>フィクション。</p>
</section>

<section id="diary" class="page">
    <h2>主席日記</h2>

    <div id="diaryEditor">
        <textarea id="diaryText"></textarea>
        <br><br>
        <button onclick="saveDiary()">保存</button>
    </div>

    <h3>公開内容</h3>
    <div id="diaryContent"></div>
</section>

<section id="enemy" class="page">
    <h2>敵対組織について</h2>
    <p>
        フィクションです<br>
        このサイトは有志によって作られた
    </p>
</section>

<section id="login" class="page">
    <h2>ログイン</h2>

    <input id="user" placeholder="ユーザー名"><br><br>

    <input id="pass" type="password" placeholder="パスワード"><br><br>

    <button onclick="login()">ログイン</button>

    <p id="loginResult"></p>
</section>

<script>

function acceptWarning(){
    document.getElementById("warning").style.display="none";
}

function showPage(page){
    document.querySelectorAll(".page").forEach(p=>{
        p.classList.remove("active");
    });

    document.getElementById(page).classList.add("active");
}

function login(){

    const user=document.getElementById("user").value;
    const pass=document.getElementById("pass").value;

    if(user==="yeahbrouiui" && pass==="0306"){
        document.getElementById("loginResult").textContent="ログイン成功";
        document.getElementById("diaryEditor").style.display="block";
    }else{
        document.getElementById("loginResult").textContent="ログイン失敗";
    }
}

function saveDiary(){

    const text=document.getElementById("diaryText").value;

    localStorage.setItem("diary",text);

    document.getElementById("diaryContent").innerText=text;
}

window.onload=function(){

    const saved=localStorage.getItem("diary");

    if(saved){
        document.getElementById("diaryContent").innerText=saved;
    }
}
</script>

</body>
</html>
